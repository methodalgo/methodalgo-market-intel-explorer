name: Publish Skill to ClawHub

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          # 1. 直接读取 SKILL.md 中的版本号
          SKILL_FILE="SKILL.md"
          VERSION=$(grep -E "^version: [0-9]+\.[0-9]+\.[0-9]+" $SKILL_FILE | awk '{print $2}')
          
          if [ -z "$VERSION" ]; then
            echo "❌ Error: Could not find version in $SKILL_FILE"
            exit 1
          fi
          
          echo "🚀 Publishing version: $VERSION"
          
          # 2. 登录并发布
          clawhub login --token "$CLAWHUB_TOKEN" --no-browser
          clawhub publish . --version "$VERSION"
