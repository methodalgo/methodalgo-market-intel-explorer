name: Publish Skill to ClawHub

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Auto-increment version and Publish
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          # 1. 提取当前版本
          SKILL_FILE="SKILL.md"
          CURRENT_VERSION=$(grep -E "^version: [0-9]+\.[0-9]+\.[0-9]+" $SKILL_FILE | awk '{print $2}')
          
          # 2. 版本号自增 (Patch)
          IFS='.' read -ra ADDR <<< "$CURRENT_VERSION"
          NEW_VERSION="${ADDR[0]}.${ADDR[1]}.$((ADDR[2] + 1))"
          echo "Updating version from $CURRENT_VERSION to $NEW_VERSION"
          
          # 3. 更新文件
          sed -i "s/^version: $CURRENT_VERSION/version: $NEW_VERSION/" $SKILL_FILE
          
          # 4. 登录并发布
          clawhub login --token "$CLAWHUB_TOKEN" --no-browser
          clawhub publish . --version "$NEW_VERSION"
          
          # 5. 将版本变更提交回仓库
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add $SKILL_FILE
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push
